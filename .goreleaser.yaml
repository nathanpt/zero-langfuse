version: 2

project_name: zero-langfuse

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: zero-langfuse
    main: .
    binary: zero-langfuse
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'

changelog:
  use: github
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^chore:']

release:
  draft: false
  replace_existing_draft: true
